<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Forms</title>
</head>
<body>
  <!-- Netlify build-time form detection skeleton -->
  <form name="mission" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="mission">
    <input type="hidden" name="subject" value="【使命必达】新预约请求">
    <input type="text" name="nickname">
    <input type="text" name="notify_phone">
    <input type="text" name="notify_email">
    <input type="text" name="notify_sms">
    <input type="text" name="notify_wechat">
    <input type="tel" name="phone">
    <input type="email" name="email">
    <input type="text" name="wechat">
    <input type="text" name="notify_start">
    <input type="text" name="notify_end">
    <textarea name="content"></textarea>
    <input type="text" name="contact_confirm">
    <input type="text" name="privacy_consent">
    <input name="bot-field">
  </form>
</body>
</html>
